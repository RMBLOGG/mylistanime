{% extends "base.html" %}
{% block title %}Daftar — MyListAnime{% endblock %}

{% block head %}
<style>
  .view-wrap {
    max-width: 620px; margin: 0 auto;
    padding: 2rem 0 5rem;
  }
  .back {
    display: inline-flex; align-items: center; gap: 7px;
    color: var(--ink2); text-decoration: none;
    font-size: 0.82rem; font-weight: 700;
    font-family: var(--font-h);
    background: var(--card);
    border: 2.5px solid var(--outline);
    padding: 6px 14px; border-radius: 10px;
    box-shadow: var(--shadow-s);
    transition: all 0.12s; margin-bottom: 2rem;
  }
  .back:hover { transform: translate(-1px,-2px); box-shadow: 3px 5px 0 var(--outline); }

  /* Header card */
  .lv-header-card {
    background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 100%);
    border: 2.5px solid var(--outline);
    border-radius: 16px; box-shadow: var(--shadow);
    padding: 1.2rem 1.3rem; margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .lv-avatar {
    width: 52px; height: 52px; border-radius: 14px;
    background: white; border: 2.5px solid var(--outline);
    box-shadow: var(--shadow-s);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-h); font-size: 1.5rem;
    font-weight: 700; color: var(--pink); flex-shrink: 0;
  }
  .lv-username {
    font-family: var(--font-h); font-size: 1.3rem;
    font-weight: 700; color: white; line-height: 1.1; margin-bottom: 4px;
  }
  .lv-meta {
    font-size: 0.74rem; color: rgba(255,255,255,0.8);
    font-weight: 700; display: flex; align-items: center; gap: 6px;
  }
  .lv-count {
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.4);
    padding: 2px 10px; border-radius: 20px;
    font-family: var(--font-h); font-size: 0.7rem;
  }

  /* Grid */
  .view-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 10px; margin-bottom: 1.5rem;
  }
  .view-slot {
    aspect-ratio: 2/3; border-radius: 12px;
    overflow: hidden; position: relative;
    background: var(--bg2);
    border: 2.5px solid var(--outline);
    box-shadow: var(--shadow);
    transition: all 0.15s; cursor: pointer;
  }
  .view-slot:hover { transform: translate(-1px,-3px); box-shadow: 5px 7px 0 var(--outline); }
  .view-slot:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--outline); }
  .view-slot img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.3s; }
  .view-slot:hover img { transform:scale(1.04); }
  .view-slot-ov {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(26,26,46,0.88) 0%, transparent 52%);
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 8px 7px;
    pointer-events: none;
  }
  .ov-rank {
    background: var(--yellow); color: var(--ink);
    font-family: var(--font-h); font-size: 0.58rem; font-weight: 800;
    border: 1.5px solid var(--outline); border-radius: 20px;
    padding: 1px 7px; display: inline-block; margin-bottom: 3px; width: fit-content;
  }
  .ov-title { font-size: 0.64rem; color: #fff; line-height: 1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; font-weight:700; }
  .ov-tap { font-size: 0.55rem; color: rgba(255,255,255,0.6); margin-top:3px; font-weight:600; display:flex; align-items:center; gap:3px; }

  /* Actions */
  .actions-card {
    background: var(--card); border: 2.5px solid var(--outline);
    border-radius: 14px; box-shadow: var(--shadow);
    padding: 1rem 1.2rem;
    display: flex; gap: 10px; flex-wrap: wrap;
    align-items: center; justify-content: space-between;
  }
  .actions-card-left { font-family: var(--font-h); font-size: 0.85rem; color: var(--ink2); font-weight: 700; }

  /* Loading */
  .loading { text-align:center; padding:6rem 0; color:var(--ink3); }
  .loading-spinner { font-size:2rem; margin-bottom:0.8rem; display:block; color:var(--pink); }
  .loading p { font-size:0.88rem; font-weight:700; font-family:var(--font-h); }
  .not-found { text-align:center; padding:5rem 0; }
  .not-found .code { font-family:var(--font-h); font-size:5rem; font-weight:700; color:var(--bg2); line-height:1; }
  .not-found p { color:var(--ink2); font-size:0.9rem; margin-bottom:1.5rem; font-weight:700; }

  /* ══════════════════════════
     ANIME DETAIL MODAL
  ══════════════════════════ */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(26,26,46,0.65);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--modal-bg);
    border: 2.5px solid var(--outline);
    border-radius: 20px;
    width: 100%; max-width: 580px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 8px 8px 0 var(--outline);
    transform: translateY(20px) scale(0.96);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--pink); border: 2.5px solid var(--outline);
    color: white; cursor: pointer; box-shadow: var(--shadow-s);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; transition: all 0.12s; z-index: 10;
  }
  .modal-close:hover { transform: scale(1.12) rotate(8deg); }

  .modal-banner {
    width: 100%; height: 170px; position: relative;
    border-radius: 18px 18px 0 0; overflow: hidden;
  }
  .modal-banner-img { width:100%; height:100%; object-fit:cover; object-position:top; filter:brightness(0.55); }
  .modal-banner-grad { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 30%, var(--modal-bg) 100%); }
  .modal-banner-rank {
    position: absolute; top: 12px; left: 12px;
    background: var(--yellow); border: 2px solid var(--outline);
    color: var(--ink); font-size: 0.65rem; font-weight: 800;
    padding: 3px 12px; border-radius: 20px;
    box-shadow: var(--shadow-s); font-family: var(--font-h);
  }

  .modal-body-wrap { display:flex; gap:1rem; padding:0 1.2rem 1rem; margin-top:-55px; position:relative; }
  .modal-poster {
    width: 95px; flex-shrink:0; border-radius:10px; overflow:hidden;
    border: 2.5px solid var(--outline); box-shadow: var(--shadow);
    align-self: flex-start; position: relative; z-index:1;
  }
  .modal-poster img { width:100%; display:block; aspect-ratio:2/3; object-fit:cover; }
  .modal-info { flex:1; min-width:0; padding-top:58px; }

  .modal-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:0.5rem; }
  .badge { font-size:0.62rem; padding:3px 9px; border-radius:20px; font-weight:800; border:2px solid var(--outline); font-family:var(--font-h); box-shadow:var(--shadow-s); }
  .badge-tv     { background:var(--blue);   color:white; }
  .badge-movie  { background:var(--purple); color:white; }
  .badge-type   { background:var(--pink);   color:white; }
  .badge-airing { background:var(--green2); color:var(--ink); }
  .badge-fin    { background:var(--bg2);    color:var(--ink2); }

  .modal-title { font-family:var(--font-h); font-size:clamp(1rem,3vw,1.25rem); font-weight:700; line-height:1.2; margin-bottom:2px; color:var(--ink); }
  .modal-title-en { font-size:0.7rem; color:var(--ink3); margin-bottom:0.7rem; font-weight:600; }

  .modal-stats {
    display:flex; gap:8px; flex-wrap:wrap;
    padding:0.75rem; margin:0 1.2rem 0.8rem;
    background:var(--bg2); border:2px solid var(--outline);
    border-radius:12px; box-shadow:var(--shadow-s);
  }
  .stat { display:flex; flex-direction:column; gap:1px; flex:1; min-width:55px; }
  .stat-label { font-size:0.55rem; color:var(--ink3); letter-spacing:0.07em; text-transform:uppercase; font-weight:800; }
  .stat-val { font-size:0.9rem; font-weight:800; color:var(--ink); font-family:var(--font-h); }
  .stat-val.gold { color:var(--orange); }

  .modal-lower { padding:0 1.2rem 1.4rem; }
  .modal-genres { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:0.8rem; }
  .genre-tag { font-size:0.62rem; padding:3px 10px; border-radius:20px; background:var(--bg2); color:var(--ink2); border:2px solid var(--outline); font-weight:700; font-family:var(--font-h); }
  .modal-synopsis { font-size:0.8rem; color:var(--ink2); line-height:1.7; margin-bottom:0.4rem; font-weight:600; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .modal-synopsis.expanded { -webkit-line-clamp:unset; }
  .synopsis-toggle { font-size:0.72rem; color:var(--pink2); cursor:pointer; background:none; border:none; padding:0; margin-bottom:1rem; font-family:var(--font-h); font-weight:700; }
  .synopsis-toggle:hover { text-decoration:underline; }
  .modal-meta { display:grid; grid-template-columns:1fr 1fr; gap:5px 12px; font-size:0.72rem; margin-bottom:0.8rem; }
  .meta-item { display:flex; flex-direction:column; gap:1px; }
  .meta-label { font-size:0.55rem; color:var(--ink3); letter-spacing:0.06em; text-transform:uppercase; font-weight:800; }
  .meta-val { color:var(--ink2); font-weight:700; }

  .modal-watch-link {
    display:inline-flex; align-items:center; gap:7px;
    background:var(--pink); color:white;
    border:2.5px solid var(--outline); border-radius:10px;
    padding:9px 18px; font-family:var(--font-h); font-weight:700;
    font-size:0.82rem; text-decoration:none;
    box-shadow:var(--shadow); transition:all 0.12s;
  }
  .modal-watch-link:hover { transform:translate(-1px,-2px); box-shadow:5px 6px 0 var(--outline); }
  .modal-loading { display:flex; align-items:center; justify-content:center; padding:3rem; color:var(--ink3); gap:10px; font-size:0.85rem; font-weight:700; font-family:var(--font-h); }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <div class="view-wrap">
    <a href="/explore" class="back fu fu1">
      <i class="fa-solid fa-arrow-left"></i> Kembali
    </a>
    <div id="listContent">
      <div class="loading">
        <span class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i></span>
        <p>Memuat daftar…</p>
      </div>
    </div>
  </div>
</div>

<!-- ANIME DETAIL MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="modalBody">
      <div class="modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const listId = "{{ list_id }}";
  let animeList = [];
  const detailCache = {};

  function ago(d) {
    const m = Math.floor((Date.now()-new Date(d))/60000);
    if (m<1) return 'baru saja';
    if (m<60) return m+' menit lalu';
    const h=Math.floor(m/60);
    if (h<24) return h+' jam lalu';
    return Math.floor(h/24)+' hari lalu';
  }

  async function load() {
    try {
      const res = await fetch('/api/list/'+listId);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (data.error) throw new Error();
      render(data);
    } catch {
      document.getElementById('listContent').innerHTML =
        '<div class="not-found">' +
        '<div class="code">404</div>' +
        '<p>Daftar ini tidak ditemukan 😢</p>' +
        '<a href="/explore" class="btn btn-ghost">Kembali ke Jelajahi</a>' +
        '</div>';
    }
  }

  function render(data) {
    document.title = 'Daftar ' + data.username + ' — MyListAnime';
    animeList = data.anime_list || [];
    const initial = (data.username||'?').charAt(0).toUpperCase();

    const slots = animeList.map((a, i) =>
      '<div class="view-slot" onclick="openModal('+i+')">' +
        '<img src="'+a.image+'" alt="" loading="lazy">' +
        '<div class="view-slot-ov">' +
          '<div class="ov-rank">#'+(i+1)+'</div>' +
          '<div class="ov-title">'+a.title+'</div>' +
          '<div class="ov-tap"><i class="fa-solid fa-circle-info"></i> Tap untuk detail</div>' +
        '</div>' +
      '</div>'
    ).join('');

    document.getElementById('listContent').innerHTML =
      '<div class="lv-header-card fu fu1">' +
        '<div class="lv-avatar">'+initial+'</div>' +
        '<div class="lv-info">' +
          '<div class="lv-username">List '+data.username+' 🎌</div>' +
          '<div class="lv-meta">' +
            '<i class="fa-regular fa-clock"></i> '+ago(data.created_at)+
            ' &nbsp;<span class="lv-count">'+animeList.length+' anime</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="view-grid fu fu2">'+slots+'</div>' +
      '<div class="actions-card fu fu3">' +
        '<span class="actions-card-left">Bagikan ke temanmu! 👇</span>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          '<button class="btn btn-primary" onclick="copyLink()"><i class="fa-solid fa-link"></i> Salin Link</button>' +
          '<a href="/" class="btn btn-ghost"><i class="fa-solid fa-plus"></i> Buat Punyaku</a>' +
        '</div>' +
      '</div>';
  }

  // ── Modal ──
  async function openModal(idx) {
    const anime = animeList[idx]; if (!anime) return;
    const body = document.getElementById('modalBody');
    body.innerHTML = '<div class="modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>';
    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';

    const id = anime.mal_id;
    if (detailCache[id]) { renderModal(detailCache[id], idx); return; }
    try {
      const r = await fetch('https://api.jikan.moe/v4/anime/'+id);
      const j = await r.json();
      detailCache[id] = j.data;
      renderModal(j.data, idx);
    } catch {
      body.innerHTML = '<div class="modal-loading">Gagal memuat detail 😢</div>';
    }
  }

  function getBadgeClass(type) {
    if (!type) return 'badge-type';
    const t = type.toLowerCase();
    if (t==='tv') return 'badge-tv';
    if (t==='movie') return 'badge-movie';
    return 'badge-type';
  }

  function renderModal(d, idx) {
    const poster = d.images?.jpg?.large_image_url || '';
    const titleEn = d.title_english && d.title_english !== d.title ? '<div class="modal-title-en">'+d.title_english+'</div>' : '';
    const genres = (d.genres||[]).concat(d.themes||[]).map(g=>'<span class="genre-tag">'+g.name+'</span>').join('');
    const synopsis = d.synopsis ? d.synopsis.replace('[Written by MAL Rewrite]','').trim() : 'Tidak ada sinopsis.';
    const statusBadge = d.status && d.status.includes('Airing') ? 'badge-airing' : 'badge-fin';

    document.getElementById('modalBody').innerHTML =
      '<div class="modal-banner">' +
        '<img class="modal-banner-img" src="'+poster+'" alt="">' +
        '<div class="modal-banner-grad"></div>' +
        '<div class="modal-banner-rank">🏆 #'+(idx+1)+'</div>' +
      '</div>' +
      '<div class="modal-body-wrap">' +
        '<div class="modal-poster"><img src="'+poster+'" alt=""></div>' +
        '<div class="modal-info">' +
          '<div class="modal-badges">' +
            (d.type ? '<span class="badge '+getBadgeClass(d.type)+'">'+d.type+'</span>' : '') +
            (d.status ? '<span class="badge '+statusBadge+'">'+d.status+'</span>' : '') +
          '</div>' +
          '<div class="modal-title">'+d.title+'</div>' +
          titleEn +
        '</div>' +
      '</div>' +
      '<div class="modal-stats">' +
        (d.score ? '<div class="stat"><span class="stat-label">Score</span><span class="stat-val gold">⭐ '+d.score+'</span></div>' : '') +
        (d.rank ? '<div class="stat"><span class="stat-label">Rank</span><span class="stat-val">#'+d.rank+'</span></div>' : '') +
        (d.popularity ? '<div class="stat"><span class="stat-label">Populer</span><span class="stat-val">#'+d.popularity+'</span></div>' : '') +
        (d.episodes ? '<div class="stat"><span class="stat-label">Episode</span><span class="stat-val">'+d.episodes+'</span></div>' : '') +
      '</div>' +
      '<div class="modal-lower">' +
        (genres ? '<div class="modal-genres">'+genres+'</div>' : '') +
        '<div class="modal-synopsis" id="modalSynopsis">'+synopsis+'</div>' +
        '<button class="synopsis-toggle" id="synToggle" onclick="toggleSyn()">Baca selengkapnya ▾</button>' +
        '<div class="modal-meta">' +
          '<div class="meta-item"><span class="meta-label">Tayang</span><span class="meta-val">'+(d.aired?.string||'—')+'</span></div>' +
          '<div class="meta-item"><span class="meta-label">Durasi</span><span class="meta-val">'+(d.duration||'—')+'</span></div>' +
          '<div class="meta-item"><span class="meta-label">Studio</span><span class="meta-val">'+((d.studios||[]).map(s=>s.name).join(', ')||'—')+'</span></div>' +
          '<div class="meta-item"><span class="meta-label">Sumber</span><span class="meta-val">'+(d.source||'—')+'</span></div>' +
        '</div>' +
        '<a href="https://animeku-id.vercel.app/search?q='+encodeURIComponent(d.title)+'" target="_blank" class="modal-watch-link">' +
          '<i class="fa-solid fa-play"></i> Tonton di Animeku.ID' +
        '</a>' +
      '</div>';
  }

  function toggleSyn() {
    const el = document.getElementById('modalSynopsis');
    const btn = document.getElementById('synToggle');
    el.classList.toggle('expanded');
    btn.textContent = el.classList.contains('expanded') ? 'Sembunyikan ▴' : 'Baca selengkapnya ▾';
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => showToast('Link disalin! 🔗', 'success'));
  }

  load();
</script>
{% endblock %}
