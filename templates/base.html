<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyListAnime{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ════════════════════════════
       LIGHT MODE (default)
    ════════════════════════════ */
    :root,
    [data-theme="light"] {
      --white:     #ffffff;
      --bg:        #f7f5f0;
      --bg2:       #edeae3;
      --card:      #ffffff;
      --pink:      #ff6b9d;
      --pink2:     #e8457a;
      --blue:      #4dabf7;
      --blue2:     #2f9de0;
      --yellow:    #ffd43b;
      --yellow2:   #fcc419;
      --green:     #69db7c;
      --green2:    #40c057;
      --purple:    #cc5de8;
      --orange:    #ff922b;
      --ink:       #1a1a2e;
      --ink2:      #4a4a6a;
      --ink3:      #7878a0;
      --outline:   #1a1a2e;
      --shadow:    4px 4px 0px #1a1a2e;
      --shadow-s:  2px 2px 0px #1a1a2e;
      --shadow-c:  3px 3px 0px rgba(26,26,46,0.12);
      --nav-bg:    #ffffff;
      --nav-border:#1a1a2e;
      --input-bg:  #f7f5f0;
      --dropdown:  #ffffff;
      --modal-bg:  #ffffff;
      --radius:    14px;
      --font-h:    'Fredoka', sans-serif;
      --font-b:    'Nunito', sans-serif;
    }

    /* ════════════════════════════
       DARK MODE — cartoon night
    ════════════════════════════ */
    [data-theme="dark"] {
      --white:     #1e1828;
      --bg:        #13101c;
      --bg2:       #261e34;
      --card:      #1e1828;
      --pink:      #ff6b9d;
      --pink2:     #ff4d8d;
      --blue:      #4dabf7;
      --blue2:     #339af0;
      --yellow:    #ffd43b;
      --yellow2:   #fcc419;
      --green:     #69db7c;
      --green2:    #51cf66;
      --purple:    #da77f2;
      --orange:    #ff922b;
      --ink:       #fce8f0;
      --ink2:      #c8a0b8;
      --ink3:      #8a6880;
      --outline:   #ff6b9d;
      --shadow:    4px 4px 0px #c4336a;
      --shadow-s:  2px 2px 0px #c4336a;
      --shadow-c:  3px 3px 0px rgba(196,51,106,0.4);
      --nav-bg:    #17121f;
      --nav-border:#ff6b9d;
      --input-bg:  #13101c;
      --dropdown:  #251d32;
      --modal-bg:  #1e1828;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-b);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.25s, color 0.25s;
    }

    /* polka dot */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    [data-theme="light"] body::before {
      background-image: radial-gradient(circle, rgba(26,26,46,0.055) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
    }
    [data-theme="dark"] body::before {
      background-image: radial-gradient(circle, rgba(255,107,157,0.1) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
    }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      background: var(--nav-bg);
      border-bottom: 2.5px solid var(--nav-border);
      height: 58px;
      display: flex; align-items: center;
      padding: 0 1.25rem;
      justify-content: space-between;
      transition: background 0.25s, border-color 0.25s;
    }
    [data-theme="light"] nav { box-shadow: 0 3px 0 var(--outline); }
    [data-theme="dark"]  nav { box-shadow: 0 3px 0 #c4336a; }

    .nav-logo {
      font-family: var(--font-h);
      font-weight: 700; font-size: 1.25rem;
      text-decoration: none; color: var(--ink);
      display: flex; align-items: center; gap: 9px;
    }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 10px;
      background: var(--pink);
      border: 2.5px solid var(--outline);
      box-shadow: var(--shadow-s);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.7rem;
      transition: transform 0.15s;
    }
    .nav-logo:hover .logo-mark { transform: rotate(-8deg) scale(1.05); }
    .nav-logo em { font-style: normal; color: var(--pink); }

    .nav-right { display: flex; align-items: center; gap: 6px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--ink2); text-decoration: none;
      font-size: 0.82rem; font-weight: 700;
      padding: 6px 14px; border-radius: 10px;
      transition: all 0.12s; border: 2px solid transparent;
      font-family: var(--font-h); letter-spacing: 0.01em;
    }
    .nav-links a:hover {
      background: var(--bg2); border-color: var(--outline);
      box-shadow: var(--shadow-s); transform: translateY(-1px);
      color: var(--ink);
    }
    .nav-links a.active {
      background: var(--pink); color: white;
      border-color: var(--outline); box-shadow: var(--shadow-s);
    }

    /* theme toggle */
    .theme-toggle {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--yellow);
      border: 2.5px solid var(--outline);
      box-shadow: var(--shadow-s);
      color: var(--ink); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; transition: all 0.15s;
    }
    .theme-toggle:hover { transform: translateY(-2px) rotate(15deg); box-shadow: 3px 5px 0 var(--outline); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 12px;
      font-family: var(--font-h); font-weight: 600;
      font-size: 0.9rem; cursor: pointer;
      border: 2.5px solid var(--outline);
      transition: all 0.12s; text-decoration: none;
    }
    .btn-primary { background: var(--pink); color: white; box-shadow: var(--shadow); }
    .btn-primary:hover  { transform: translate(-1px,-2px); box-shadow: 5px 6px 0 var(--outline); }
    .btn-primary:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--outline); }
    .btn-ghost  { background: var(--card); color: var(--ink); box-shadow: var(--shadow-s); }
    .btn-ghost:hover  { transform: translate(-1px,-2px); box-shadow: 3px 5px 0 var(--outline); background: var(--bg2); }
    .btn-ghost:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 var(--outline); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

    /* ── Container ── */
    .container {
      max-width: 1040px; margin: 0 auto;
      padding: 0 1.25rem; position: relative; z-index: 1;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 22px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      color: white; padding: 10px 22px; border-radius: 50px;
      font-size: 0.82rem; font-family: var(--font-h); font-weight: 700;
      z-index: 9999; border: 2.5px solid var(--outline);
      box-shadow: var(--shadow);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; background: var(--ink);
    }
    #toast.show  { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green2); color: var(--ink); border-color: var(--outline); }
    #toast.error   { background: var(--pink2);  color: white; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--ink3); border-radius: 3px; }

    @keyframes popIn  { from{opacity:0;transform:scale(0.88) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fu  { animation: fadeUp 0.4s ease forwards; }
    .fu1 { animation-delay:0.04s; opacity:0; }
    .fu2 { animation-delay:0.1s;  opacity:0; }
    .fu3 { animation-delay:0.17s; opacity:0; }
    .fu4 { animation-delay:0.25s; opacity:0; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">
      <div class="logo-mark"><i class="fa-solid fa-star"></i></div>
      MyList<em>Anime</em>
    </a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Buat List</a>
        <a href="/explore" class="{% if request.path == '/explore' %}active{% endif %}">Jelajahi</a>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Ganti tema">
        <i class="fa-solid fa-moon" id="themeIcon"></i>
      </button>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <div id="toast"></div>
  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    // default light
    const saved = localStorage.getItem('mla-theme') || 'light';
    setTheme(saved);

    function setTheme(t) {
      html.setAttribute('data-theme', t);
      themeIcon.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
      localStorage.setItem('mla-theme', t);
    }
    toggle.addEventListener('click', () =>
      setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')
    );

    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = type;
      void t.offsetWidth; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
