{% extends "base.html" %}
{% block title %}Jelajahi — MyListAnime{% endblock %}

{% block head %}
<style>
  .page-top {
    padding: 3rem 0 2rem;
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 1rem;
    flex-wrap: wrap;
  }
  .page-top-left h1 {
    font-family: var(--font-jp);
    font-size: clamp(1.7rem, 5vw, 2.5rem);
    font-weight: 700; letter-spacing: -0.02em; line-height: 1.1;
  }
  .page-top-left p { color: var(--text2); font-size: 0.83rem; margin-top: 5px; font-weight: 300; }
  .live-dot {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.72rem; color: var(--text3);
    background: var(--bg3); border: 1px solid var(--border2);
    padding: 4px 11px; border-radius: 50px;
  }
  .live-dot i { color: #5ee89a; font-size: 0.5rem; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Grid ── */
  .lists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    padding-bottom: 5rem;
  }

  .list-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    text-decoration: none; color: var(--text);
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    display: block;
    animation: fadeUp 0.4s ease forwards; opacity: 0;
  }
  .list-card:hover {
    border-color: rgba(232,130,154,0.25);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
  }

  /* 3x3 mosaic */
  .card-mosaic {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 2px; aspect-ratio: 1;
    background: var(--bg);
    overflow: hidden;
  }
  .card-mosaic img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.3s;
  }
  .list-card:hover .card-mosaic img { transform: scale(1.04); }
  .card-mosaic .empty { background: var(--bg3); }

  .card-body { padding: 0.9rem 1rem; }
  .card-user {
    font-family: var(--font-jp); font-weight: 700;
    font-size: 0.95rem; margin-bottom: 3px;
    display: flex; align-items: center; gap: 7px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-user-icon {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--sakura-dim); border: 1px solid rgba(232,130,154,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--sakura); font-size: 0.55rem; flex-shrink: 0;
  }
  .card-meta {
    font-size: 0.7rem; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
  }
  .card-titles {
    margin-top: 6px; font-size: 0.72rem; color: var(--text2);
    line-height: 1.5; font-weight: 300;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* Skeleton */
  .skel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }
  .skel-sq {
    aspect-ratio: 1; background: var(--bg3);
    animation: shimmer 1.6s infinite;
  }
  .skel-body { padding: 0.9rem; }
  .skel-line {
    height: 12px; background: var(--bg3); border-radius: 4px;
    margin-bottom: 7px; animation: shimmer 1.6s infinite;
  }
  .skel-line.s { width: 55%; }
  @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* Empty */
  .empty-state {
    grid-column: 1/-1; text-align: center;
    padding: 5rem 1rem; color: var(--text3);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state p { font-size: 0.88rem; margin-bottom: 1.2rem; }

  /* Load more */
  .load-more {
    text-align: center; padding: 0.5rem 0 5rem;
    display: none;
  }

  /* ── Modal ── */
  .modal-backdrop { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.72); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity 0.22s; }
  .modal-backdrop.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border:1px solid var(--border2); border-radius:18px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; transform:translateY(20px) scale(0.97); transition:transform 0.25s cubic-bezier(.34,1.56,.64,1); position:relative; }
  .modal-backdrop.open .modal { transform:translateY(0) scale(1); }
  .modal-close { position:absolute; top:14px; right:14px; width:32px; height:32px; border-radius:50%; background:var(--bg3); border:1px solid var(--border2); color:var(--text2); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.75rem; transition:all 0.15s; z-index:10; }
  .modal-close:hover { background:var(--sakura); color:#fff; border-color:transparent; }
  .modal-banner { width:100%; height:180px; position:relative; border-radius:18px 18px 0 0; overflow:hidden; }
  .modal-banner-img { width:100%; height:100%; object-fit:cover; object-position:top; filter:brightness(0.5); }
  .modal-banner-grad { position:absolute; inset:0; background:linear-gradient(to bottom, transparent 30%, var(--bg2) 100%); }
  .modal-body-wrap { display:flex; gap:1rem; padding:0 1.2rem 0; margin-top:-60px; position:relative; }
  .modal-poster { width:100px; flex-shrink:0; border-radius:10px; overflow:hidden; border:2px solid var(--border2); box-shadow:0 8px 24px rgba(0,0,0,0.45); align-self:flex-start; position:relative; z-index:1; }
  .modal-poster img { width:100%; display:block; aspect-ratio:2/3; object-fit:cover; }
  .modal-info { flex:1; min-width:0; padding-top:62px; }
  .modal-badge-row { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:0.6rem; }
  .badge { font-size:0.62rem; padding:3px 8px; border-radius:20px; font-weight:600; letter-spacing:0.04em; }
  .badge-type { background:var(--sakura-dim); color:var(--sakura); border:1px solid rgba(232,130,154,0.2); }
  .badge-status { background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
  .badge-rating { background:var(--bg3); color:var(--text3); border:1px solid var(--border2); }
  .modal-title { font-family:'Kaisei Decol',serif; font-size:clamp(1rem,3vw,1.3rem); font-weight:700; line-height:1.2; margin-bottom:3px; color:var(--text); }
  .modal-title-en { font-size:0.7rem; color:var(--text3); margin-bottom:0.8rem; }
  .modal-stats { display:flex; gap:14px; margin:1rem 1.2rem; flex-wrap:wrap; }
  .stat { display:flex; flex-direction:column; gap:1px; }
  .stat-label { font-size:0.58rem; color:var(--text3); letter-spacing:0.07em; text-transform:uppercase; }
  .stat-val { font-size:0.88rem; font-weight:700; color:var(--text); }
  .stat-val.gold { color:var(--gold); }
  .modal-lower { padding:0 1.2rem 1.4rem; }
  .modal-synopsis { font-size:0.78rem; color:var(--text2); line-height:1.7; margin-bottom:0.5rem; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
  .modal-synopsis.expanded { -webkit-line-clamp:unset; }
  .synopsis-toggle { font-size:0.7rem; color:var(--sakura); cursor:pointer; background:none; border:none; padding:0; margin-bottom:1rem; font-family:inherit; }
  .synopsis-toggle:hover { text-decoration:underline; }
  .modal-genres { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:1rem; }
  .genre-tag { font-size:0.62rem; padding:3px 9px; border-radius:20px; background:var(--bg3); color:var(--text2); border:1px solid var(--border2); }
  .modal-meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; font-size:0.72rem; margin-bottom:0.5rem; }
  .meta-item { display:flex; flex-direction:column; gap:1px; }
  .meta-label { font-size:0.58rem; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; }
  .meta-val { color:var(--text2); }
  .modal-watch-link { display:inline-flex; align-items:center; gap:6px; margin-top:0.8rem; font-size:0.73rem; color:#fff; text-decoration:none; border-radius:8px; padding:7px 14px; background:var(--sakura); font-weight:600; transition:all 0.15s; }
  .modal-watch-link:hover { background:var(--sakura2); transform:translateY(-1px); box-shadow:0 6px 20px rgba(232,130,154,0.3); }
  .modal-loading { display:flex; align-items:center; justify-content:center; padding:3rem; color:var(--text3); gap:10px; font-size:0.83rem; }
  /* mosaic cell clickable */
  .mosaic-cell { cursor:pointer; position:relative; overflow:hidden; transition:transform 0.2s; }
  .mosaic-cell:hover { transform:scale(1.05); z-index:1; }
  .mosaic-cell img { width:100%; height:100%; object-fit:cover; display:block; transition:filter 0.2s; }
  .mosaic-cell:hover img { filter:brightness(0.7); }
</style>
{% endblock %}

{% block content %}
<div class="container">
  <div class="page-top fu fu1">
    <div class="page-top-left">
      <h1>Jelajahi</h1>
      <p>Lihat anime yang mendefinisikan orang lain</p>
    </div>
    <div class="live-dot"><i class="fa-solid fa-circle"></i> Live</div>
  </div>

  <div class="lists-grid" id="listsGrid">
    {% for i in range(8) %}
    <div class="skel">
      <div class="skel-sq"></div>
      <div class="skel-body">
        <div class="skel-line"></div>
        <div class="skel-line s"></div>
      </div>
    </div>
    {% endfor %}
  </div>

  <div class="load-more" id="loadMore">
    <button class="btn btn-ghost" id="loadMoreBtn">
      <i class="fa-solid fa-rotate"></i> Load more
    </button>
  </div>
</div>

<!-- Modal Detail Anime -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="modalBody">
      <div class="modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let page = 1, busy = false;

  function ago(d) {
    const m = Math.floor((Date.now() - new Date(d)) / 60000);
    if (m < 1) return 'baru saja';
    if (m < 60) return `${m}m lalu`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}j lalu`;
    return `${Math.floor(h/24)}h lalu`;
  }

  function card(item) {
    const list = item.anime_list || [];
    const cells = Array.from({length:9}, (_,i) =>
      list[i]
        ? `<div class="mosaic-cell" onclick="openAnimeModal(${list[i].mal_id},event)" title="${list[i].title}"><img src="${list[i].image}" alt="" loading="lazy"></div>`
        : `<div class="empty"></div>`
    ).join('');
    const titles = list.slice(0,4).map(a=>a.title).join(', ');
    return `
      <a href="/list/${item.id}" class="list-card">
        <div class="card-mosaic">${cells}</div>
        <div class="card-body">
          <div class="card-user">
            <div class="card-user-icon"><i class="fa-solid fa-user"></i></div>
            ${item.username}
          </div>
          <div class="card-meta">
            <span>${ago(item.created_at)}</span>
            <span>·</span>
            <span>${list.length} anime</span>
          </div>
          <div class="card-titles">${titles}${list.length>4?'…':''}</div>
        </div>
      </a>
    `;
  }

  async function load() {
    if (busy) return; busy = true;
    try {
      const res  = await fetch(`/api/lists?page=${page}`);
      const data = await res.json();
      const grid = document.getElementById('listsGrid');
      if (page === 1) grid.innerHTML = '';
      if (!data.length && page === 1) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="emoji">🎌</div>
            <p>Belum ada list — jadilah yang pertama!</p>
            <a href="/" class="btn btn-primary">Buat Listku</a>
          </div>`;
        return;
      }
      grid.innerHTML += data.map(card).join('');
      document.getElementById('loadMore').style.display = data.length === 12 ? 'block' : 'none';
    } catch(e) { console.error(e); }
    busy = false;
  }


  // ── Modal ──
  const detailCache = {};

  async function openAnimeModal(malId, e) {
    e && e.preventDefault();
    e && e.stopPropagation();
    const backdrop = document.getElementById('modalBackdrop');
    const body = document.getElementById('modalBody');
    body.innerHTML = '<div class="modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>';
    backdrop.classList.add('open');
    document.body.style.overflow = 'hidden';

    if (detailCache[malId]) { renderModal(detailCache[malId]); return; }
    try {
      const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
      const json = await res.json();
      detailCache[malId] = json.data;
      renderModal(json.data);
    } catch {
      body.innerHTML = '<div class="modal-loading">Gagal memuat detail.</div>';
    }
  }

  function renderModal(a) {
    const posterUrl = a.images?.jpg?.large_image_url || a.images?.jpg?.image_url || '';
    const titleEn = a.title_english && a.title_english !== a.title ? a.title_english : '';
    const genres = (a.genres||[]).concat(a.themes||[]).map(g=>`<span class="genre-tag">${g.name}</span>`).join('');
    const studios = (a.studios||[]).map(s=>s.name).join(', ') || '—';
    const producers = (a.producers||[]).slice(0,3).map(p=>p.name).join(', ') || '—';
    const synopsis = a.synopsis ? a.synopsis.replace('[Written by MAL Rewrite]','').trim() : 'Tidak ada sinopsis.';
    const aired = a.aired?.string || '—';
    const status = a.status || '—';

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-banner">
        <img class="modal-banner-img" src="${posterUrl}" alt="">
        <div class="modal-banner-grad"></div>
      </div>
      <div class="modal-body-wrap">
        <div class="modal-poster"><img src="${posterUrl}" alt="${a.title}"></div>
        <div class="modal-info">
          <div class="modal-badge-row">
            ${a.type ? `<span class="badge badge-type">${a.type}</span>` : ''}
            <span class="badge badge-status">${status}</span>
            ${a.rating ? `<span class="badge badge-rating">${a.rating}</span>` : ''}
          </div>
          <div class="modal-title">${a.title}</div>
          ${titleEn ? `<div class="modal-title-en">${titleEn}</div>` : ''}
        </div>
      </div>
      <div class="modal-stats">
        ${a.score ? `<div class="stat"><div class="stat-label">Skor</div><div class="stat-val gold">★ ${a.score}</div></div>` : ''}
        ${a.rank ? `<div class="stat"><div class="stat-label">Ranking</div><div class="stat-val">#${a.rank}</div></div>` : ''}
        ${a.popularity ? `<div class="stat"><div class="stat-label">Popularitas</div><div class="stat-val">#${a.popularity}</div></div>` : ''}
        ${a.members ? `<div class="stat"><div class="stat-label">Members</div><div class="stat-val">${a.members.toLocaleString()}</div></div>` : ''}
        ${a.episodes ? `<div class="stat"><div class="stat-label">Episode</div><div class="stat-val">${a.episodes}</div></div>` : ''}
        ${a.duration ? `<div class="stat"><div class="stat-label">Durasi</div><div class="stat-val">${a.duration}</div></div>` : ''}
      </div>
      <div class="modal-lower">
        ${genres ? `<div class="modal-genres">${genres}</div>` : ''}
        <div class="modal-synopsis" id="modalSynopsis">${synopsis}</div>
        <button class="synopsis-toggle" id="synToggle" onclick="toggleSynopsis()">Baca selengkapnya</button>
        <div class="modal-meta-grid">
          <div class="meta-item"><div class="meta-label">Studio</div><div class="meta-val">${studios}</div></div>
          <div class="meta-item"><div class="meta-label">Produser</div><div class="meta-val">${producers}</div></div>
          <div class="meta-item"><div class="meta-label">Tayang</div><div class="meta-val">${aired}</div></div>
          <div class="meta-item"><div class="meta-label">Season</div><div class="meta-val">${a.season ? a.season.charAt(0).toUpperCase()+a.season.slice(1)+' '+a.year : (a.year||'—')}</div></div>
          ${a.source ? `<div class="meta-item"><div class="meta-label">Sumber</div><div class="meta-val">${a.source}</div></div>` : ''}
        </div>
        <a href="https://animeku-id.vercel.app/search?q=${encodeURIComponent(a.title)}" target="_blank" class="modal-watch-link">
          <i class="fa-solid fa-play"></i> Tonton di Animeku.ID
        </a>
      </div>`;
  }

  function toggleSynopsis() {
    const el = document.getElementById('modalSynopsis');
    const btn = document.getElementById('synToggle');
    el.classList.toggle('expanded');
    btn.textContent = el.classList.contains('expanded') ? 'Sembunyikan' : 'Baca selengkapnya';
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  document.getElementById('loadMoreBtn').addEventListener('click', () => { page++; load(); });
  load();
</script>
{% endblock %}
